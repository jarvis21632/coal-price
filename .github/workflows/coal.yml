name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install requests
          pip install playwright

      - run: playwright install chromium

      - run: python coal.py

      - uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: page.png
