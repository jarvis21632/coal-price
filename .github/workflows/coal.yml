name: Energy Report

on:
workflow_dispatch:

schedule:
- cron: '0 23 * * *'

jobs:
send_line:

runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: |
      pip install requests
      pip install beautifulsoup4

  - run: python coal.py
    env:
      LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
